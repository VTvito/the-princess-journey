<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-first, landscape platformer. viewport-fit=cover handles iPhone notch. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#26325c" />
    <title>The Princess Journey</title>
    <!-- Inline empty icon to avoid a 404 favicon request. -->
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Kaplay renders here; it letterboxes the 16:9 canvas inside the viewport.
         tabindex makes the canvas focusable so keyboard input keeps working after the DOM
         "Insert Coin" overlay steals focus on respawn (see src/scenes/game.js focusCanvas). -->
    <canvas id="game" tabindex="0"></canvas>

    <!-- Shown only when a touch device is held in portrait (CSS-driven). -->
    <div id="rotate-overlay">
      <div class="rotate-inner">
        <div class="rotate-icon">🔄</div>
        <p>Ruota il dispositivo in orizzontale</p>
      </div>
    </div>

    <!-- On-screen controls. Shown only on touch devices (CSS @media pointer:coarse);
         wired in src/controls.js via pointer/touch events. -->
    <div id="touch-controls">
      <div id="dpad">
        <button id="btn-left" type="button" aria-label="Sinistra">◀</button>
        <button id="btn-right" type="button" aria-label="Destra">▶</button>
      </div>
      <button id="btn-jump" type="button" aria-label="Salto">⤴</button>
    </div>

    <!-- Music + SFX toggles (top-right). Independent buses; wired in src/ui/audioToggle.js. -->
    <button id="music-toggle" type="button" aria-label="Disattiva musica">🎵</button>
    <button id="audio-toggle" type="button" aria-label="Disattiva effetti">🔊</button>

    <!-- "Insert Coin" death overlay (spec §1). DOM, not Kaplay; shown by
         src/ui/insertCoin.js when the heroine fails. -->
    <div id="coin-overlay" class="overlay" hidden>
      <div class="overlay-card coin-card">
        <p class="coin-text">
          Ops! Hai sbagliato.<br />
          Inserisci <strong>500 Coccoline</strong> per continuare.
        </p>
        <button id="coin-btn" type="button" class="ui-btn">Inserisci Coin</button>
      </div>
    </div>

    <!-- Finale receipt + WhatsApp payoff (spec §2). Filled by src/ui/receipt.js. -->
    <div id="receipt-overlay" class="overlay" hidden>
      <div class="overlay-card receipt-card">
        <div class="receipt-head">SCONTRINO</div>
        <div class="receipt-sub">Principessa Perfetta S.p.A.</div>
        <div class="receipt-rule"></div>
        <p class="receipt-line">Costo totale dell'operazione:</p>
        <p class="receipt-total"><span id="receipt-amount">0</span> Coccoline</p>
        <div class="receipt-rule"></div>
        <p class="receipt-foot">Grazie per aver giocato ❤️</p>
        <button id="receipt-pay" type="button" class="ui-btn pay-btn">Paga il Debito!</button>
        <button id="receipt-close" type="button" class="ui-btn ghost-btn">Chiudi</button>
      </div>
    </div>

    <!-- Scene-transition fade (spec §4). Purely visual; pointer-none. -->
    <div id="fade"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
